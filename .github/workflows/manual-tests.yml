name: Manual Tests

on:
  workflow_dispatch:
    inputs:
      run_lint:
        description: "Run Ruff lint (ruff check .) before tests"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (Ruff)
        if: ${{ github.event.inputs.run_lint == 'true' }}
        run: ruff check .

      - name: Unit tests
        run: pytest
